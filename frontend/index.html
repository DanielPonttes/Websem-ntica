<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ODSDR — Diagnóstico Semântico</title>
  <meta name="description"
    content="Sistema de apoio ao diagnóstico semântico de doenças respiratórias baseado em ontologia OWL.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🫁</text></svg>">
</head>

<body>
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-icon">🫁</span>
        <span class="logo-text">ODSDR</span>
      </div>
      <p class="logo-subtitle">Diagnóstico Semântico</p>
    </div>
    <nav class="nav">
      <a href="#/" class="nav-link active" data-page="dashboard">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1" />
          <rect x="14" y="3" width="7" height="7" rx="1" />
          <rect x="3" y="14" width="7" height="7" rx="1" />
          <rect x="14" y="14" width="7" height="7" rx="1" />
        </svg>
        <span>Dashboard</span>
      </a>
      <a href="#/diagnostico" class="nav-link" data-page="diagnostico">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 12h-4l-3 9L9 3l-3 9H2" />
        </svg>
        <span>Diagnóstico</span>
      </a>
      <a href="#/pacientes" class="nav-link" data-page="pacientes">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
          <path d="M16 3.13a4 4 0 0 1 0 7.75" />
        </svg>
        <span>Pacientes</span>
      </a>
      <a href="#/consultas" class="nav-link" data-page="consultas">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="16 18 22 12 16 6" />
          <polyline points="8 6 2 12 8 18" />
        </svg>
        <span>Consultas</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="theme-toggle" id="themeToggle">
        <span class="theme-toggle-icon" id="themeIcon">🌙</span>
        <span id="themeLabel">Modo Claro</span>
      </button>
      <div class="status-indicator" id="apiStatus">
        <span class="status-dot"></span>
        <span class="status-text">Verificando...</span>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main" id="main">
    <div class="page-container" id="app">
      <!-- Pages are rendered here dynamically -->
    </div>
  </main>

  <!-- Toast Container -->
  <div class="toast-container" id="toasts"></div>

  <script src="js/api.js"></script>
  <script src="js/components.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/diagnostico.js"></script>
  <script src="js/pages/pacientes.js"></script>
  <script src="js/pages/consultas.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
